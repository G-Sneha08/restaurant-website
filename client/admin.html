<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Dine | Admin Command Center</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --sidebar-width: 280px;
            --header-height: 70px;
            --admin-primary: #6366f1;
            --admin-sidebar: #1e293b;
            --bg-light: #f1f5f9;
            --white: #ffffff;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --transition: all 0.2s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-light); color: #1e293b; display: flex; min-height: 100vh; }
        .sidebar { width: var(--sidebar-width); background: var(--admin-sidebar); color: white; position: fixed; height: 100vh; padding: 24px; }
        .sidebar-header { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 6px; }
        .sidebar-nav a { display: flex; align-items: center; gap: 12px; color: #94a3b8; padding: 12px 16px; text-decoration: none; border-radius: 10px; transition: var(--transition); }
        .sidebar-nav a.active, .sidebar-nav a:hover { background: rgba(255, 255, 255, 0.05); color: white; }
        .sidebar-nav a.active { background: var(--admin-primary); }
        .main-container { margin-left: var(--sidebar-width); flex-grow: 1; width: calc(100% - var(--sidebar-width)); }
        .top-header { height: var(--header-height); background: var(--white); border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .content-area { padding: 40px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 24px; border-radius: 16px; box-shadow: var(--card-shadow); display: flex; justify-content: space-between; align-items: center; }
        .admin-card { background: white; border-radius: 16px; box-shadow: var(--card-shadow); overflow: hidden; margin-bottom: 40px; }
        .card-header { padding: 24px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 16px 24px; text-align: left; font-size: 0.75rem; color: #64748b; }
        td { padding: 16px 24px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 32px; border-radius: 12px; width: 100%; max-width: 500px; }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 0.8rem; margin-bottom: 5px; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header"><i class="fas fa-utensils"></i><h2>ADMIN</h2></div>
        <nav class="sidebar-nav">
            <a href="#" class="active" onclick="switchSection('dashboard')" id="nav-dashboard"><i class="fas fa-home"></i><span>Dashboard</span></a>
            <a href="#" onclick="switchSection('orders')" id="nav-orders"><i class="fas fa-shopping-cart"></i><span>Orders</span></a>
            <a href="#" onclick="switchSection('bookings')" id="nav-bookings"><i class="fas fa-calendar"></i><span>Bookings</span></a>
            <a href="#" onclick="switchSection('menu')" id="nav-menu"><i class="fas fa-list"></i><span>Menu</span></a>
            <a href="#" onclick="switchSection('users')" id="nav-users"><i class="fas fa-users"></i><span>Users</span></a>
        </nav>
        <div style="margin-top:auto; padding-top:20px;">
            <a href="/index.html" style="color:#94a3b8; text-decoration:none;"><i class="fas fa-external-link-alt"></i> Main Site</a>
        </div>
    </aside>

    <div class="main-container">
        <header class="top-header"><h1>Admin Panel</h1><button onclick="logout()" class="btn btn-outline btn-sm">Sign Out</button></header>
        <div class="content-area">
            <div id="section-dashboard" class="stats-grid">
                <div class="stat-card"><div><div id="stat-revenue" style="font-size:1.5rem;font-weight:700;">₹0</div><div>Revenue</div></div><i class="fas fa-money-bill"></i></div>
                <div class="stat-card"><div><div id="stat-orders" style="font-size:1.5rem;font-weight:700;">0</div><div>Orders</div></div><i class="fas fa-shopping-bag"></i></div>
            </div>

            <div id="section-orders" style="display:none;"><div class="admin-card"><div class="card-header"><h3>Orders</h3></div><table><thead><tr><th>ID</th><th>User</th><th>Total</th><th>Status</th><th>Action</th></tr></thead><tbody id="orders-list"></tbody></table></div></div>
            <div id="section-bookings" style="display:none;"><div class="admin-card"><div class="card-header"><h3>Bookings</h3></div><table><thead><tr><th>ID</th><th>Name</th><th>Date</th><th>Status</th><th>Action</th></tr></thead><tbody id="bookings-list"></tbody></table></div></div>
            <div id="section-menu" style="display:none;">
                <div style="display:flex;justify-content:space-between;margin-bottom:20px;"><h3>Menu Catalog</h3><button onclick="openMenuModal()" class="btn btn-primary">Add Item</button></div>
                <div class="admin-card"><table><thead><tr><th>ID</th><th>Name</th><th>Cat</th><th>Price</th><th>Action</th></tr></thead><tbody id="menu-list"></tbody></table></div>
            </div>
            <div id="section-users" style="display:none;"><div class="admin-card"><table><thead><tr><th>ID</th><th>Email</th><th>Role</th></tr></thead><tbody id="users-list"></tbody></table></div></div>
        </div>
    </div>

    <div id="menu-modal" class="modal"><div class="modal-content">
        <h3>Menu Item</h3>
        <form id="menu-form" onsubmit="handleMenuSubmit(event)">
            <input type="hidden" id="menu-id" name="id">
            <div class="form-group"><label for="menu-name">Name</label><input type="text" id="menu-name" class="form-control" required></div>
            <div class="form-group"><label for="menu-price">Price</label><input type="number" id="menu-price" class="form-control" required></div>
            <div class="form-group"><label for="menu-category">Category</label><select id="menu-category" class="form-control"><option value="Starters">Starters</option><option value="Main Course">Main Course</option><option value="Beverages">Beverages</option><option value="Desserts">Desserts</option><option value="Breads">Breads</option></select></div>
            <div class="form-group"><label for="menu-desc">Description</label><textarea id="menu-desc" class="form-control"></textarea></div>
            <div style="display:flex;gap:10px;"><button type="submit" class="btn btn-primary">Save</button><button type="button" onclick="closeMenuModal()" class="btn btn-outline">Cancel</button></div>
        </form>
    </div></div>

    <script src="/js/config.js"></script>
    <script>
        let currentData = { orders:[], bookings:[], menu:[], users:[] };
        const token = localStorage.getItem("token");
        if (!token) window.location.href = "/login.html";

        function switchSection(s) {
            ['dashboard', 'orders', 'bookings', 'menu', 'users'].forEach(x => {
                document.getElementById(`section-${x}`).style.display = (x === s) ? 'block' : 'none';
                document.getElementById(`nav-${x}`).classList.toggle('active', x === s);
            });
            if(s==='dashboard') loadStats(); else loadTable(s);
        }

        async function loadStats() {
            try {
                const data = await apiRequest('/admin/stats');
                document.getElementById('stat-revenue').innerText = `₹${data.totalRevenue || 0}`;
                document.getElementById('stat-orders').innerText = data.totalOrders || 0;
            } catch(e) { console.error(e); }
        }

        async function loadTable(t) {
            try {
                const res = await apiRequest(`/admin/${t}`);
                const b = document.getElementById(`${t}-list`);
                if(!b) return;
                
                let items = Array.isArray(res) ? res : (res[t] || res.orders || res.bookings || res.menu || []);
                currentData[t] = items;

                b.innerHTML = items.map((x, i) => {
                    if(t==='menu') return `<tr><td>#${x.id}</td><td>${x.name}</td><td>${x.category}</td><td>₹${x.price}</td><td><button onclick="editM(${i})">Edit</button></td></tr>`;
                    if(t==='orders') return `<tr><td>#${x.id}</td><td>${x.user_name||'Guest'}</td><td>₹${x.total_amount}</td><td>${x.status}</td><td><select onchange="upd(${x.id},'orders',this.value)"><option value="Pending" ${x.status==='Pending'?'selected':''}>Pending</option><option value="Delivered" ${x.status==='Delivered'?'selected':''}>Delivered</option></select></td></tr>`;
                    if(t==='bookings') return `<tr><td>#${x.id}</td><td>${x.customer_name}</td><td>${x.date}</td><td>${x.status}</td><td><select onchange="upd(${x.id},'bookings',this.value)"><option value="Pending" ${x.status==='Pending'?'selected':''}>Pending</option><option value="Confirmed" ${x.status==='Confirmed'?'selected':''}>Confirmed</option></select></td></tr>`;
                    if(t==='users') return `<tr><td>#${x.id}</td><td>${x.email}</td><td>${x.role}</td></tr>`;
                    return '';
                }).join('');
            } catch(e) { console.error("Table Error:", e); }
        }

        async function upd(id, t, s) { try { await apiRequest(`/admin/${t}/${id}/status`, {method:'PUT', body:JSON.stringify({status:s})}); loadTable(t); } catch(e){console.error(e);} }
        function logout() { localStorage.clear(); window.location.href="/login.html"; }

        function openMenuModal() { document.getElementById('menu-form').reset(); document.getElementById('menu-id').value=''; document.getElementById('menu-modal').style.display='flex'; }
        function closeMenuModal() { document.getElementById('menu-modal').style.display='none'; }
        
        function editM(index) {
            const item = currentData.menu[index];
            document.getElementById('menu-id').value = item.id;
            document.getElementById('menu-name').value = item.name;
            document.getElementById('menu-price').value = item.price;
            document.getElementById('menu-category').value = item.category;
            document.getElementById('menu-desc').value = item.description || '';
            document.getElementById('menu-modal').style.display = 'flex';
        }

        async function handleMenuSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('menu-id').value;
            const payload = {
                name: document.getElementById('menu-name').value,
                price: document.getElementById('menu-price').value,
                category: document.getElementById('menu-category').value,
                description: document.getElementById('menu-desc').value
            };
            try {
                await apiRequest(id ? `/admin/menu/${id}` : '/admin/menu', { method: id ? 'PUT' : 'POST', body: JSON.stringify(payload) });
                alert("Success!");
                closeMenuModal();
                loadTable('menu');
            } catch(e) { alert("Error: " + e.message); }
        }
        
        document.addEventListener('DOMContentLoaded', () => { loadStats(); });
    </script>
</body>
</html>
