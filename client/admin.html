<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Dine | Experience the Taste of Excellence</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .admin-sidebar {
            background: var(--secondary);
            color: white;
            padding: 30px;
            min-height: 100vh;
        }

        .admin-sidebar a {
            display: block;
            padding: 10px 0;
            color: #ccc;
        }

        .admin-sidebar a:hover,
        .admin-sidebar a.active {
            color: white;
            font-weight: 600;
        }

        .admin-main {
            flex: 1;
            padding: 40px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>

<body style="display:flex;">
    <aside class="admin-sidebar" style="width:250px;">
        <h2 style="margin-bottom:40px; color:var(--primary);">Admin Board</h2>
        <nav>
            <a href="#" class="active" onclick="showTab('orders')">Manage Orders</a>
            <a href="#" onclick="showTab('menu')">Manage Menu</a>
            <a href="#" onclick="showTab('users')">Manage Users</a>
            <hr style="margin:20px 0; border:0.5px solid #444;">
            <a href="index.html">Back to Site</a>
            <a href="#" onclick="logout()" style="color:var(--primary);">Logout</a>
        </nav>
    </aside>

    <main class="admin-main">
        <!-- Orders Tab -->
        <div id="orders-tab" class="tab-content active">
            <h2>Orders Management</h2>
            <table style="margin-top:20px;">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>User</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="admin-orders-list"></tbody>
            </table>
        </div>

        <!-- Menu Tab -->
        <div id="menu-tab" class="tab-content">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Menu Management</h2>
                <button class="btn btn-primary" onclick="showAddMenuModal()">+ Add New Item</button>
            </div>
            <table style="margin-top:20px;">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="admin-menu-list"></tbody>
            </table>
        </div>

        <!-- Users Tab -->
        <div id="users-tab" class="tab-content">
            <h2>User Management</h2>
            <table style="margin-top:20px;">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Joined</th>
                    </tr>
                </thead>
                <tbody id="admin-users-list"></tbody>
            </table>
        </div>
    </main>


    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/admin.js"></script>
</body>
</body>

</html>
