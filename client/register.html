<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Dine | Experience the Taste of Excellence</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">LUMINA DINE</a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="form-container">
            <h2 class="text-center">Join Lumina Dine</h2>
            <p class="text-center" style="color:var(--text-light); margin-bottom: 30px;">Create your account</p>
    <form id="registerForm">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required placeholder="John Doe">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="name@example.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Register</button>
    </form>
    <div class="auth-footer">
        Already have an account? <a href="login.html">Login</a>
    </div>
    <div id="message" class="text-center mt-20"></div>
</div>
</main>

<script src="js/config.js"></script>
<script src="js/main.js"></script>
<script src="js/auth.js"></script>
</body>
</body>

</html>
