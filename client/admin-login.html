<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Lumina Dine</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .login-card {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: #fff;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid #eee;
        }
        .login-card h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary);
        }
    </style>
</head>
<body style="background: var(--accent);">
    <div class="login-card">
        <h2>Admin Portal</h2>
        <form id="admin-login-form" autocomplete="on">
            <div class="form-group">
                <label for="email">Admin Email</label>
                <input type="email" id="email" name="email" required placeholder="admin@example.com" value="admin@example.com" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••" value="password123" autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Login</button>
        </form>
    </div>

    <script src="/js/config.js"></script>
    <script>
        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_BASE_URL}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem("adminLoggedIn", "true");
                    localStorage.setItem("adminToken", data.token);
                    localStorage.setItem("token", data.token);
                    localStorage.setItem("user", JSON.stringify(data.user || { role: 'admin' }));
                    window.location.href = "admin.html";
                } else {
                    alert(data.message || "Invalid credentials");
                }
            } catch (err) {
                console.error(err);
                alert("Login failed. Check backend.");
            }
        });
    </script>
</body>
</html>
