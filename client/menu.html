<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ Exquisite Menu | Lumina Dine ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .menu-section { margin-bottom: 60px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; margin-top: 20px; }
        /* Add to Cart Button Red Styling */
        .add-to-cart { background-color: #e53935; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: background-color 0.3s ease; width: 100%; }
        .add-to-cart:hover { background-color: #b71c1c; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 20px; }
        .card-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; }
        .card-desc { font-size: 0.9rem; color: #666; margin-bottom: 15px; height: 40px; overflow: hidden; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; }
        .card-price { font-size: 1.15rem; font-weight: 700; color: var(--primary); }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav id="navbar">
                <a href="index.html" class="logo">LUMINA DINE</a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html" class="active">Menu</a></li>
                    <li><a href="cart.html">Cart <span id="cart-count">0</span></a></li>
                    <li><a href="#footer">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="section-title" style="text-align:center; padding: 60px 0;">
                <h1>Our Culinary Gallery</h1>
                <p>Explore the finest selection of dishes at Lumina Dine</p>
            </div>

            <section id="starters" class="menu-section">
                <h2 class="section-heading">Starters</h2>
                <div class="grid"></div>
            </section>

            <section id="main-course" class="menu-section">
                <h2 class="section-heading">Main Course</h2>
                <div class="grid"></div>
            </section>

            
            <section id="beverages" class="menu-section">
                <h2 class="section-heading">Beverages</h2>
                <div class="grid"></div>
            </section>

            <section id="desserts" class="menu-section">
                <h2 class="section-heading">Desserts</h2>
                <div class="grid"></div>
            </section>
        </div>
    </main>

    <footer style="background-color:#1a1a1a; color:#f5f5f5; text-align:center; padding:40px 20px;">
        <div style="font-size:2rem; margin-bottom:10px;">✨ <span style="font-weight:700;">Lumina Dine</span> ✨</div>
        <p style="font-size:1rem; margin-bottom:20px; color:#dcdcdc;">Curating flavors, creating memories</p>
        <p style="font-size:0.85rem; color:#a9a9a9;">© 2026 Lumina Dine 🥂 All rights reserved.</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
