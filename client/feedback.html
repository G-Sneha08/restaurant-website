<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Dine | Experience the Taste of Excellence</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <div class="container">
            <nav id="navbar"></nav>
        </div>
    </header>

    <main>
        <div class="container" style="max-width: 800px; margin-top:50px;">
            <div class="text-center">
                <h2>Customer Feedback</h2>
                <p style="color:var(--text-light);">We value your opinion.</p>
            </div>

            <form id="feedback-form" class="card" style="padding: 30px; margin-top: 30px;">
                <div class="form-group">
                    <label for="rating">Rating</label>
                    <select id="rating" required>
                        <option value="5">⭐⭐⭐⭐⭐ (Excellent)</option>
                        <option value="4">⭐⭐⭐⭐ (Great)</option>
                        <option value="3">⭐⭐⭐ (Good)</option>
                        <option value="2">⭐⭐ (Fair)</option>
                        <option value="1">⭐ (Poor)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">Your Experience</label>
                    <textarea id="message" rows="4" placeholder="Tell us how we did..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Submit Feedback</button>
            </form>

            <div style="margin-top: 60px;">
                <h3 class="text-center">What Others Say</h3>
                <div id="feedback-list" style="margin-top: 30px;">
                    <p class="text-center">Loading testimonials...</p>
                </div>
            </div>
        </div>
    </main>


    <script>
        document.getElementById('feedback-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('token');
            if (!token) { alert('Please login to submit feedback'); return; }

            const rating = document.getElementById('rating').value;
            const message = document.getElementById('message').value;

            try {
                const response = await fetch('https://restaurant-website-489aafoff-g-sneha08s-projects.vercel.app/api/feedback', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ message, rating })
                });

                if (response.ok) {
                    alert('Thank you for your feedback!');
                    document.getElementById('feedback-form').reset();
                    loadFeedback();
                }
            } catch (err) { console.error(err); }
        });

        async function loadFeedback() {
            try {
                const response = await fetch('https://restaurant-website-489aafoff-g-sneha08s-projects.vercel.app/api/feedback');
                const feedback = await response.json();
                const list = document.getElementById('feedback-list');

                if (feedback.length === 0) {
                    list.innerHTML = '<p class="text-center">No feedback yet. Be the first!</p>';
                    return;
                }

                list.innerHTML = feedback.map(f => `
                    <div class="card" style="margin-bottom: 20px; padding: 20px;">
                        <div style="color: gold; margin-bottom: 10px;">${'⭐'.repeat(f.rating)}</div>
                        <p style="font-style: italic; color: var(--text-dark);">"${f.message}"</p>
                        <p style="margin-top: 15px; font-size: 0.85rem; font-weight: 600;">- ${f.name}</p>
                    </div>
                `).join('');
            } catch (err) { console.error(err); }
        }

        document.addEventListener('DOMContentLoaded', loadFeedback);
    </script>
    <script src="js/config.js"></script>

</body>

</html>
