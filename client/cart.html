<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Dine | Experience the Taste of Excellence</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">LUMINA DINE</a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="index.html#featured">Menu</a></li>
                    <li><a href="cart.html" id="cart-link">Cart <span id="cart-count">(0)</span></a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="container" style="margin-top:50px; min-height: 60vh;">
            <h2 class="section-title">Your Shopping Cart</h2>

            <div id="cart-display">
                <table id="cart-table" style="display:none;">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Subtotal</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="cart-items">
                        <!-- Items will be injected here -->
                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="3" style="text-align:right; font-weight:700; padding: 20px;">Cart Total:</td>
                            <td id="total-price" style="font-weight:700; color:#27ae60; font-size:1.5rem;">₹0</td>
                            <td></td>
                        </tr>
                    </tfoot>
                </table>

                <div id="empty-msg" class="text-center" style="padding: 100px 0;">
                    <i class="fas fa-shopping-basket" style="font-size: 4rem; color: #ddd; margin-bottom: 20px;"></i>
                    <h3>Your cart is empty</h3>
                    <p style="color: var(--text-light); margin-bottom: 30px;">Add some delicious Indian food to get
                        started!</p>
                    <a href="index.html#featured" class="btn btn-primary">Browse Menu</a>
                </div>

                <div id="cart-footer-actions" class="text-center" style="display:none; margin-top: 40px;">
                    <button onclick="clearCart()" class="btn btn-outline" style="margin-right: 15px;">Clear
                        Cart</button>
                    <button onclick="checkout()" class="btn btn-primary">Proceed to Checkout</button>
                </div>
            </div>
        </div>
    </main>

    <footer style="margin-top: 100px;">
        <div class="container text-center">
            <p>&copy; 2026 LUMINA DINE. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/cart.js"></script>
    <script>
        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('restaurant_cart')) || [];
            const tbody = document.getElementById('cart-items');
            const table = document.getElementById('cart-table');
            const emptyMsg = document.getElementById('empty-msg');
            const footerActions = document.getElementById('cart-footer-actions');
            const totalDisplay = document.getElementById('total-price');

            if (cart.length === 0) {
                table.style.display = 'none';
                emptyMsg.style.display = 'block';
                footerActions.style.display = 'none';
                return;
            }

            table.style.display = 'table';
            emptyMsg.style.display = 'none';
            footerActions.style.display = 'block';

            let total = 0;
            tbody.innerHTML = cart.map(item => {
                const subtotal = item.price * item.quantity;
                total += subtotal;
                return `
                    <tr>
                        <td>
                            <div style="display:flex; align-items:center; gap:15px;">
                                <img src="${item.image}" alt="${item.name}" style="width:60px; height:60px; border-radius:10px; object-fit:cover;">
                                <span>${item.name}</span>
                            </div>
                        </td>
                        <td>₹${item.price}</td>
                        <td>
                            <div style="display:flex; align-items:center; gap:10px;">
                                <button onclick="changeQty('${item.id}', -1)" class="btn-outline" style="padding:2px 10px; border-width:1px;">-</button>
                                <span>${item.quantity}</span>
                                <button onclick="changeQty('${item.id}', 1)" class="btn-outline" style="padding:2px 10px; border-width:1px;">+</button>
                            </div>
                        </td>
                        <td>₹${subtotal}</td>
                        <td>
                            <button onclick="deleteItem('${item.id}')" style="color:var(--primary); background:none; border:none; cursor:pointer; font-size:1.2rem;">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');

            totalDisplay.innerText = `₹${total}`;
        }

        function changeQty(id, delta) {
            let cart = JSON.parse(localStorage.getItem('restaurant_cart')) || [];
            const index = cart.findIndex(item => item.id == id);
            if (index > -1) {
                cart[index].quantity += delta;
                if (cart[index].quantity < 1) cart[index].quantity = 1;
                localStorage.setItem('restaurant_cart', JSON.stringify(cart));
                renderCart();
                updateCartCount();
            }
        }

        function deleteItem(id) {
            let cart = JSON.parse(localStorage.getItem('restaurant_cart')) || [];
            cart = cart.filter(item => item.id != id);
            localStorage.setItem('restaurant_cart', JSON.stringify(cart));
            renderCart();
            updateCartCount();
        }

        function clearCart() {
            if (confirm('Are you sure you want to clear your cart?')) {
                localStorage.setItem('restaurant_cart', JSON.stringify([]));
                renderCart();
                updateCartCount();
            }
        }

        function checkout() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                alert('Please login to place an order.');
                window.location.href = 'login.html';
                return;
            }
            alert('Checkout functionality integration with backend would happen here.');
        }

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>

</html>
