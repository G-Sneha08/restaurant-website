<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumina Dine | Cart</title>

<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

<body>

<header>
<nav>

<a href="index.html" class="logo">LUMINA DINE</a>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="index.html#featured">Menu</a></li>
<li><a href="cart.html">Cart <span id="cart-count">(0)</span></a></li>
</ul>

</nav>
</header>

<main>

<div class="container" style="margin-top:50px;">

<h2>Your Shopping Cart</h2>

<table id="cart-table" style="display:none;">

<thead>
<tr>
<th>Item</th>
<th>Price</th>
<th>Quantity</th>
<th>Subtotal</th>
<th>Action</th>
</tr>
</thead>

<tbody id="cart-items"></tbody>

<tfoot>
<tr>
<td colspan="3" style="text-align:right;font-weight:700;">Cart Total:</td>
<td id="total-price" style="font-weight:700;color:#27ae60;">₹0</td>
<td></td>
</tr>
</tfoot>

</table>

<div id="empty-msg" style="text-align:center;padding:100px 0;">

<i class="fas fa-shopping-basket" style="font-size:4rem;color:#ddd;"></i>

<h3>Your cart is empty</h3>

<a href="index.html#featured" class="btn btn-primary">Browse Menu</a>

</div>

<div id="cart-footer-actions" style="display:none;text-align:center;margin-top:20px;">

<button onclick="clearFullCart()" class="btn btn-outline" style="margin-right:10px;">
Clear Cart
</button>

<button onclick="checkoutCart()" class="btn btn-primary">
Proceed to Checkout
</button>

</div>

</div>

</main>

<!-- JS FILES -->

<script src="js/config.js"></script>
<script src="js/main.js"></script>
<script src="js/cart.js"></script>

<script>

// ================= LOAD CART =================
async function loadCart(){

try{

const res = await fetch(`${window.API_BASE_URL}/cart/${window.USER_ID}`);
const data = await res.json();

const tbody = document.getElementById("cart-items");
const table = document.getElementById("cart-table");
const emptyMsg = document.getElementById("empty-msg");
const footerActions = document.getElementById("cart-footer-actions");
const totalPriceEl = document.getElementById("total-price");

tbody.innerHTML="";

if(!data.success || data.cart.length===0){

table.style.display="none";
footerActions.style.display="none";
emptyMsg.style.display="block";
totalPriceEl.innerText="₹0";

return;

}

table.style.display="table";
footerActions.style.display="block";
emptyMsg.style.display="none";

data.cart.forEach(item=>{

const price=item.price||0;
const name=item.item_name||"Menu Item";

const row=`
<tr>

<td>${name}</td>

<td>₹${price}</td>

<td>

<button onclick="updateCartQuantity(${item.id},${item.quantity-1})">-</button>

${item.quantity}

<button onclick="updateCartQuantity(${item.id},${item.quantity+1})">+</button>

</td>

<td>₹${(price*item.quantity).toFixed(2)}</td>

<td>

<button onclick="deleteCartItem(${item.id})" class="btn-remove">
🗑️
</button>

</td>

</tr>
`;

tbody.innerHTML+=row;

});

totalPriceEl.innerText=`₹${data.totalPrice}`;

updateNavbar();

}catch(err){

console.error("Cart load error:",err);

}

}

// ================= UPDATE QUANTITY =================
async function updateCartQuantity(cartId,quantity){

if(quantity<1)return;

try{

const res=await fetch(`${window.API_BASE_URL}/cart/${cartId}`,{

method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({quantity})

});

const data=await res.json();

if(data.success){

loadCart();

}

}catch(err){

console.error("Update cart error:",err);

}

}

// ================= DELETE ITEM =================
async function deleteCartItem(cartId){

try{

const res=await fetch(`${window.API_BASE_URL}/cart/${cartId}`,{

method:"DELETE"

});

const data=await res.json();

if(data.success){

loadCart();

}

}catch(err){

console.error("Delete cart error:",err);

}

}

// ================= CLEAR FULL CART =================
async function clearFullCart(){

try{

const res=await fetch(`${window.API_BASE_URL}/cart/clear/${window.USER_ID}`,{

method:"DELETE"

});

const data=await res.json();

if(data.success){

loadCart();

}

}catch(err){

console.error("Clear cart error:",err);

}

}

// ================= CHECKOUT =================
async function checkoutCart(){

alert("Checkout feature coming soon");

}

// ================= NAVBAR COUNT =================
async function updateNavbar(){

try{

const res=await fetch(`${window.API_BASE_URL}/cart/${window.USER_ID}`);
const data=await res.json();

const countEl=document.getElementById("cart-count");

if(data.success){

const totalItems=data.cart.reduce((sum,item)=>sum+item.quantity,0);

countEl.innerText=`(${totalItems})`;

}

}catch(err){

console.error("Navbar error:",err);

}

}

// ================= PAGE LOAD =================
document.addEventListener("DOMContentLoaded",()=>{

loadCart();

});

</script>

<style>

.btn-remove{
background:none;
border:none;
font-size:1rem;
cursor:pointer;
color:#e53935;
}

.btn-remove:hover{
color:#b71c1c;
}

</style>

</body>
</html>
