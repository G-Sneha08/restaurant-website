<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Dine | Cart</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <header>
        <nav>
            <a href="index.html" class="logo">LUMINA DINE</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#featured">Menu</a></li>
                <li><a href="cart.html">Cart <span id="cart-count">(0)</span></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container" style="margin-top:50px;">
            <h2>Your Shopping Cart</h2>

            <table id="cart-table" style="display:none;">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Subtotal</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="cart-items"></tbody>
                <tfoot>
                    <tr>
                        <td colspan="3" style="text-align:right; font-weight:700;">Cart Total:</td>
                        <td id="total-price" style="font-weight:700; color:#27ae60;">₹0</td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>

            <div id="empty-msg" style="text-align:center; padding: 100px 0;">
                <i class="fas fa-shopping-basket" style="font-size: 4rem; color: #ddd;"></i>
                <h3>Your cart is empty</h3>
                <a href="index.html#featured" class="btn btn-primary">Browse Menu</a>
            </div>

            <div id="cart-footer-actions" style="display:none; text-align:center; margin-top:20px;">
                <button onclick="clearFullCart()" class="btn btn-outline" style="margin-right:10px;">Clear Cart</button>
                <button onclick="checkoutCart()" class="btn btn-primary">Proceed to Checkout</button>
            </div>
        </div>
    </main>

    <!-- JS Scripts -->
    <script src="js/config.js"></script>
    <script>
        // -------------------------------
        // CONFIG
        // -------------------------------
        const API_BASE_URL = "https://restaurant-backend-cli2.onrender.com/api"; // Your backend API
        const USER_ID = 1; // Replace with dynamic logged-in user ID

        // -------------------------------
        // LOAD CART
        // -------------------------------
        async function loadCart() {
            try {
                const res = await fetch(`${API_BASE_URL}/cart/${USER_ID}`);
                const data = await res.json();

                const tbody = document.getElementById('cart-items');
                const table = document.getElementById('cart-table');
                const emptyMsg = document.getElementById('empty-msg');
                const totalPriceEl = document.getElementById('total-price');
                const footerActions = document.getElementById('cart-footer-actions');

                if (!data.success || data.cart.length === 0) {
                    table.style.display = 'none';
                    footerActions.style.display = 'none';
                    emptyMsg.style.display = 'block';
                    totalPriceEl.innerText = '₹0';
                    return;
                }

                table.style.display = 'table';
                footerActions.style.display = 'block';
                emptyMsg.style.display = 'none';

                tbody.innerHTML = data.cart.map(item => `
                    <tr>
                        <td>${item.item_name}</td>
                        <td>₹${item.price}</td>
                        <td>
                            <button onclick="updateCartQuantity(${item.id}, ${item.quantity - 1})">-</button>
                            ${item.quantity}
                            <button onclick="updateCartQuantity(${item.id}, ${item.quantity + 1})">+</button>
                        </td>
                        <td>₹${(item.price * item.quantity).toFixed(2)}</td>
                        <td>
                            <button onclick="deleteCartItem(${item.id})" class="btn-remove">🗑️</button>
                        </td>
                    </tr>
                `).join('');

                totalPriceEl.innerText = `₹${data.totalPrice}`;
                updateNavbar(); // update cart count in navbar
            } catch (err) {
                console.error("Load cart error:", err);
            }
        }

        // -------------------------------
        // UPDATE QUANTITY
        // -------------------------------
        async function updateCartQuantity(cartId, quantity) {
            if (quantity < 1) return;
            try {
                const res = await fetch(`${API_BASE_URL}/cart/${cartId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quantity })
                });
                const data = await res.json();
                if (data.success) {
                    loadCart();
                } else {
                    alert(data.message);
                }
            } catch (err) {
                console.error("Update cart error:", err);
            }
        }

        // -------------------------------
        // DELETE ITEM
        // -------------------------------
        async function deleteCartItem(cartId) {
            try {
                const res = await fetch(`${API_BASE_URL}/cart/${cartId}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) loadCart();
            } catch (err) {
                console.error("Delete cart item error:", err);
            }
        }

        // -------------------------------
        // CLEAR FULL CART
        // -------------------------------
        async function clearFullCart() {
            try {
                const res = await fetch(`${API_BASE_URL}/cart`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) loadCart();
            } catch (err) {
                console.error("Clear cart error:", err);
            }
        }

        // -------------------------------
        // CHECKOUT
        // -------------------------------
        async function checkoutCart() {
            try {
                const res = await fetch(`${API_BASE_URL}/cart/checkout`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    alert("Order placed successfully! Order ID: " + data.orderId);
                    loadCart();
                } else {
                    alert(data.message);
                }
            } catch (err) {
                console.error("Checkout error:", err);
            }
        }

        // -------------------------------
        // UPDATE NAVBAR CART COUNT
        // -------------------------------
        async function updateNavbar() {
            try {
                const res = await fetch(`${API_BASE_URL}/cart/${USER_ID}`);
                const data = await res.json();
                const countEl = document.getElementById('cart-count');
                if (data.success) {
                    const totalItems = data.cart.reduce((sum, item) => sum + item.quantity, 0);
                    countEl.innerText = `(${totalItems})`;
                }
            } catch (err) {
                console.error("Navbar update error:", err);
            }
        }

        // -------------------------------
        // INITIALIZE ON PAGE LOAD
        // -------------------------------
        document.addEventListener('DOMContentLoaded', () => {
            loadCart();
        });
    </script>

    <style>
        .btn-remove {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: #e53935;
        }
        .btn-remove:hover {
            color: #b71c1c;
        }
    </style>
</body>
</html>
