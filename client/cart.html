<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Dine | Your Fine Dining Cart</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/cart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <header>
        <nav id="navbar">
            <a href="index.html" class="logo">LUMINA DINE</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="cart.html">Cart <span id="cart-count"></span></a></li>
                <li id="auth-links"></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h2 class="cart-title">Your <span style="color:var(--primary);">Shopping</span> Experience</h2>

        <div class="cart-container" id="cart-content">
            <!-- Table will be rendered here by cart.js -->
            <table id="cart-table" style="display:none;">
                <thead>
                    <tr>
                        <th style="text-align: left;">Item Selection</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Subtotal</th>
                        <th>Remove</th>
                    </tr>
                </thead>
                <tbody id="cart-items"></tbody>
            </table>

            <!-- EMPTY CART -->
            <div id="empty-msg" class="empty-cart-visual" style="display:none;">
                <i class="fas fa-shopping-basket"></i>
                <h3>Your selection is empty</h3>
                <p style="color:var(--text-light); margin-bottom: 30px;">Indulge in our exquisite menu and add some flavors here.</p>
                <a href="menu.html" class="btn btn-primary">Browse Fine Dining Menu</a>
            </div>

            <!-- FOOTER TOTAL & ACTIONS -->
            <div id="cart-footer-actions" class="cart-summary" style="display:none;">
                <div class="total-info">
                    <span class="total-label">Grand Total:</span>
                    <span id="total-price" class="total-amount">₹0</span>
                </div>
                <div class="footer-btns">
                    <button onclick="clearFullCart()" class="btn btn-clear">Clear Selection</button>
                    <button onclick="checkoutCart()" class="btn btn-checkout">Proceed to Checkout</button>
                </div>
            </div>
        </div>
    </main>

    <!-- JS FILES -->
    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
