<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Dine | Experience the Taste of Excellence</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <div class="booking-section">
            <nav id="navbar"></nav>
        </div>
    </header>

    <main>
        <div class="booking-form-container">
            <div class="grid" style="margin-top:50px;">
                
                <!-- LEFT SIDE FORM -->
                <div class="form-section">
                    <h2>Book a Table</h2>
                    <p style="color:var(--text-light); margin-bottom: 30px;">
                        Reservations are recommended for weekends.
                    </p>

                    <form id="booking-form" class="card" style="padding: 30px;">
                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" id="date" required>
                        </div>

                        <div class="form-group">
                            <label for="time">Time</label>
                            <input type="time" id="time" required>
                        </div>

                        <div class="form-group">
                            <label for="guests">Number of Guests</label>
                            <select id="guests" required>
                                <option value="1">1 Person</option>
                                <option value="2">2 People</option>
                                <option value="3">3 People</option>
                                <option value="4">4 People</option>
                                <option value="5">5 People</option>
                                <option value="6">6 People</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary" style="width:100%;">
                            Confirm Reservation
                        </button>
                    </form>
                </div>

                <!-- RIGHT SIDE BOOKINGS -->
                <div class="status-section">
                    <h2>Your Bookings</h2>
                    <div id="booking-list" style="margin-top:30px;">
                        <p class="text-center">Loading your reservations...</p>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Only external scripts -->
        <script src="js/config.js"></script>
        <script src="js/main.js"></script>
        <script src="js/booking.js"></script>
</body>
</html>
