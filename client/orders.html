<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Dine | Your Culinary Journey</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header>
        <nav id="navbar">
            <a href="index.html" class="logo">LUMINA DINE</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="cart.html">Cart <span id="cart-count"></span></a></li>
                <li id="auth-links"></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:50px;">
            <h2 style="font-size:2.5rem; margin-bottom:0;">Order <span style="color:var(--primary);">History</span></h2>
            <button id="clear-orders-btn" onclick="clearOrders()" class="btn btn-outline" style="border-color:#ff4d4d; color:#ff4d4d; display:none;">
                <i class="fas fa-trash-alt" style="margin-right:8px;"></i> Clear History
            </button>
        </div>

        <div id="orders-list" class="grid" style="margin-top:40px;">
            <div id="loading" class="text-center" style="grid-column: 1 / -1; padding: 40px; color: var(--text-light);">
                <i class="fas fa-spinner fa-spin" style="font-size:2rem; margin-bottom:15px;"></i>
                <p>Retrieving your exquisite orders...</p>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/orders.js"></script>
</body>
</html>
